<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SlideHub — Remote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: pan-y;
            user-select: none;
            overflow: hidden;
        }

        #slide-indicator {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 3rem;
            align-items: center;
        }

        .btn-nav {
            background: #333;
            border: none;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-nav:active {
            background: #555;
            transform: scale(0.95);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: default;
        }

        #swipe-hint {
            margin-top: 3rem;
            opacity: 0.4;
            font-size: 0.85rem;
        }

        #help-btn {
            position: fixed;
            bottom: 2rem;
            left: 1.5rem;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0.7rem 1.1rem;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.45rem;
            z-index: 210;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            -webkit-tap-highlight-color: transparent;
        }

        #help-btn.visible {
            display: flex;
        }

        #help-btn:active {
            transform: scale(0.97);
        }

        #mic-btn {
            position: fixed;
            bottom: 2rem;
            left: 9.2rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.45rem;
            z-index: 210;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            -webkit-tap-highlight-color: transparent;
        }

        #mic-btn.visible {
            display: flex;
        }

        #mic-btn.recording {
            background: #dc2626;
        }

        #assist-card {
            position: fixed;
            left: 0.8rem;
            right: 0.8rem;
            bottom: 5.9rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 0.75rem;
            z-index: 500;
            display: none;
        }

        #assist-card.visible {
            display: block;
        }

        #assist-card .title {
            font-size: 0.76rem;
            color: #93c5fd;
            margin-bottom: 0.35rem;
        }

        #assist-card .content {
            font-size: 0.8rem;
            line-height: 1.35;
            color: #e5e7eb;
        }

        #join-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        #join-overlay.visible {
            display: flex;
        }

        .join-card {
            width: 100%;
            max-width: 420px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1rem;
        }

        .join-card h3 {
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }

        .join-card select,
        .join-card input,
        .join-card button {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #121212;
            color: white;
            padding: 0.7rem;
            margin-bottom: 0.65rem;
        }

        .join-card button {
            background: #2563eb;
            border-color: #2563eb;
            font-weight: 600;
        }

        #notice {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            font-size: 0.8rem;
            z-index: 600;
            display: none;
            max-width: 70vw;
        }

        #notice.visible {
            display: block;
        }

        /* Botón "Volver al Slide" — visible solo en modo url */
        #btn-return-slide {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1d4ed8;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            z-index: 200;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-return-slide.visible {
            display: flex;
        }

        #btn-return-slide:active {
            background: #1e40af;
            transform: translateX(-50%) scale(0.97);
        }

        /* FAB "Demo" */
        #btn-demo-fab {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #btn-demo-fab:active {
            transform: scale(0.95);
        }

        /* Bottom sheet */
        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #333;
            border-radius: 16px 16px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 300;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        #bottom-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #555;
            border-radius: 2px;
            margin: 0.75rem auto 0.25rem;
        }

        .sheet-title {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            padding: 0.25rem 1rem 0.75rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .sheet-links {
            overflow-y: auto;
            padding: 0.75rem 1rem;
            flex: 1;
        }

        .demo-link-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #242424;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            padding: 0.85rem 1rem;
            width: 100%;
            text-align: left;
            cursor: pointer;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }

        .demo-link-btn:active {
            background: #333;
        }

        .demo-link-desc {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
        }

        /* Overlay para cerrar el bottom sheet */
        #sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 250;
            display: none;
        }

        #sheet-overlay.visible {
            display: block;
        }
    </style>
</head>

<body>
    <!-- Botón de retorno (aparece en modo URL) -->
    <button id="btn-return-slide" onclick="returnToSlide()">
        <i class="fa fa-arrow-left"></i>
        <span id="return-label">Volver al Slide</span>
    </button>

    <div id="slide-indicator">Slide — / —</div>
    <div class="controls">
        <button class="btn-nav" id="btn-prev" disabled aria-label="Anterior">
            <i class="fa fa-chevron-left"></i>
        </button>
        <button class="btn-nav" id="btn-next" disabled aria-label="Siguiente">
            <i class="fa fa-chevron-right"></i>
        </button>
    </div>
    <div id="swipe-hint">← desliza →</div>

    <button id="help-btn" type="button" onclick="requestHelp()">
        <i class="fa fa-life-ring"></i>
        Pedir ayuda
    </button>

    <button id="mic-btn" type="button" title="Mantén presionado para preguntar">
        <i class="fa fa-microphone"></i>
        Mic
    </button>

    <div id="assist-card">
        <div class="title">Sugerencia IA</div>
        <div class="content" id="assist-answer-text"></div>
    </div>

    <!-- FAB Demo (solo si hay quick links) -->
    <button id="btn-demo-fab" th:style="${!hasQuickLinks} ? 'display:none' : ''" onclick="openSheet()" title="Demos">
        <i class="fa fa-globe"></i>
    </button>

    <!-- Overlay -->
    <div id="sheet-overlay" onclick="closeSheet()"></div>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title"><i class="fa fa-globe me-1"></i>Quick Links de Demo</div>
        <div class="sheet-links" id="sheet-links-container">
            <!-- inyectado server-side con Thymeleaf -->
            <button th:each="link : ${quickLinks}" th:data-url="${link.url}" class="demo-link-btn"
                onclick="activateDemoLink(this.dataset.url)">
                <i th:if="${link.icon != null}" th:class="${link.icon} + ' fa-fw'"></i>
                <i th:if="${link.icon == null}" class="fa fa-link fa-fw"></i>
                <span>
                    <span th:text="${link.title}">Título</span>
                    <span th:if="${link.description != null}" th:text="${link.description}"
                        class="demo-link-desc"></span>
                </span>
            </button>
            <div th:if="${quickLinks.isEmpty()}" class="text-center" style="color:#666; padding: 2rem 0;">
                Sin links de demo configurados.
            </div>
        </div>
    </div>

    <div id="join-overlay">
        <div class="join-card">
            <h3><i class="fa fa-qrcode me-1"></i>Unirse a la reunión</h3>
            <select id="join-participant-select"></select>
            <input id="join-custom-name" type="text" maxlength="120" placeholder="Otro nombre (opcional)">
            <button type="button" onclick="submitJoin()">Entrar</button>
        </div>
    </div>

    <div id="notice"></div>

    <script th:inline="javascript">
        const POLL_INTERVAL_MS = /*[[${pollIntervalMs}]]*/ 1000;
        const API_SLIDE_URL = '/api/slide';
        const API_DEMO_URL = '/api/demo';

        const query = new URLSearchParams(window.location.search);
        const PRESENTATION_ID = query.get('presentationId') || '';
        const JOIN_TOKEN = query.get('joinToken') || '';
        const STORAGE_KEY = `participant-token:${PRESENTATION_ID}`;

        let currentSlide = 1;
        let totalSlides = 0;
        let demoMode = 'slides';
        let returnSlide = null;
        let participantToken = localStorage.getItem(STORAGE_KEY) || '';
        let lastSlideForAssignment = -1;
        let noticeTimeout;
        let mediaRecorder = null;
        let mediaStream = null;
        let audioChunks = [];
        let recording = false;

        const indicator = document.getElementById('slide-indicator');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnReturn = document.getElementById('btn-return-slide');
        const returnLabel = document.getElementById('return-label');
        const joinOverlay = document.getElementById('join-overlay');
        const participantSelect = document.getElementById('join-participant-select');
        const customNameInput = document.getElementById('join-custom-name');
        const helpBtn = document.getElementById('help-btn');
        const micBtn = document.getElementById('mic-btn');
        const notice = document.getElementById('notice');
        const assistCard = document.getElementById('assist-card');
        const assistAnswerText = document.getElementById('assist-answer-text');

        // ── Estado de slides ───────────────────────────────────────────────────

        function updateUI() {
            indicator.textContent = `Slide ${currentSlide} / ${totalSlides}`;
            btnPrev.disabled = currentSlide <= 1;
            btnNext.disabled = currentSlide >= totalSlides;
        }

        async function fetchState() {
            try {
                const [slideRes, demoRes] = await Promise.all([
                    fetch(API_SLIDE_URL),
                    fetch(API_DEMO_URL)
                ]);
                if (slideRes.ok) {
                    const data = await slideRes.json();
                    const previousSlide = currentSlide;
                    currentSlide = data.slide;
                    totalSlides = data.totalSlides;
                    updateUI();
                    if (participantToken && previousSlide !== currentSlide) {
                        await checkSlideAssignment();
                    }
                }
                if (demoRes.ok) {
                    const demo = await demoRes.json();
                    onDemoStateChange(demo);
                }
                if (participantToken) {
                    await pollHapticEvent();
                }
            } catch (_) { }
        }

        function onDemoStateChange(demo) {
            demoMode = demo.mode;
            returnSlide = demo.returnSlide ?? null;
            if (demo.mode === 'url') {
                const label = returnSlide ? `Volver al Slide ${returnSlide}` : 'Volver a Slides';
                returnLabel.textContent = label;
                btnReturn.classList.add('visible');
            } else {
                btnReturn.classList.remove('visible');
            }
        }

        // ── Navegación ─────────────────────────────────────────────────────────

        async function navigate(delta) {
            const target = currentSlide + delta;
            if (target < 1 || target > totalSlides) return;
            try {
                await fetch(API_SLIDE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slide: target, totalSlides })
                });
                currentSlide = target;
                updateUI();
                if (navigator.vibrate) navigator.vibrate(30);
            } catch (_) { }
        }

        btnPrev.addEventListener('click', () => navigate(-1));
        btnNext.addEventListener('click', () => navigate(1));

        // Soporte swipe (HU-004)
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
        }, { passive: true });

        // ── Demo controls ──────────────────────────────────────────────────────

        async function activateDemoLink(url) {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'url', url, returnSlide: currentSlide })
                });
                if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            } catch (_) { }
            closeSheet();
        }

        async function checkSlideAssignment() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || !participantToken || currentSlide === lastSlideForAssignment) {
                return;
            }
            lastSlideForAssignment = currentSlide;
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/assignment-check?joinToken=${encodeURIComponent(JOIN_TOKEN)}&participantToken=${encodeURIComponent(participantToken)}&slideNumber=${currentSlide}`);
                if (!res.ok) {
                    return;
                }
                const data = await res.json();
                if (data.vibrate) {
                    triggerHaptic(data.pattern || 'single', data.message || 'Tu slide está activa');
                }
            } catch (_) { }
        }

        async function pollHapticEvent() {
            try {
                const res = await fetch(`/api/haptics/events/next?participantToken=${encodeURIComponent(participantToken)}`);
                if (res.status === 204 || !res.ok) {
                    return;
                }
                const event = await res.json();
                triggerHaptic(event.pattern || 'single', event.message || 'Notificación');
            } catch (_) { }
        }

        function triggerHaptic(pattern, message) {
            const sequence = pattern === 'triple' ? [90, 130, 90, 130, 90] : [110];
            if (navigator.vibrate) {
                navigator.vibrate(sequence);
            }
            showNotice(message || (pattern === 'triple' ? 'Solicitud de ayuda' : 'Turno asignado'));
            if (message && message.startsWith('IA para')) {
                showAssistCard(message);
            }
        }

        function showNotice(message) {
            if (!message) {
                return;
            }
            notice.textContent = message;
            notice.classList.add('visible');
            clearTimeout(noticeTimeout);
            noticeTimeout = setTimeout(() => notice.classList.remove('visible'), 2400);
        }

        async function loadJoinOptions() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || participantToken) {
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/join-options?joinToken=${encodeURIComponent(JOIN_TOKEN)}`);
                if (!res.ok) {
                    showNotice('No fue posible validar la sesión de reunión');
                    return;
                }
                const data = await res.json();
                const participants = data.participants || [];
                participantSelect.innerHTML = '<option value="">Selecciona tu nombre</option>' +
                    participants.map(p => `<option value="${p.id}">${p.displayName}</option>`).join('');
                joinOverlay.classList.add('visible');
            } catch (_) {
                showNotice('Error cargando participantes de la reunión');
            }
        }

        async function submitJoin() {
            const payload = {
                joinToken: JOIN_TOKEN,
                participantId: participantSelect.value || null,
                customName: customNameInput.value || null
            };

            if (!payload.participantId && !payload.customName) {
                showNotice('Selecciona un nombre o escribe uno');
                return;
            }

            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    showNotice('No se pudo completar el ingreso a la reunión');
                    return;
                }
                const data = await res.json();
                participantToken = data.participantToken || '';
                if (participantToken) {
                    localStorage.setItem(STORAGE_KEY, participantToken);
                    helpBtn.classList.add('visible');
                    micBtn.classList.add('visible');
                    joinOverlay.classList.remove('visible');
                    showNotice(`Conectado como ${data.displayName || 'participante'}`);
                }
            } catch (_) {
                showNotice('Error de red al unirse a la reunión');
            }
        }

        async function requestHelp() {
            if (!PRESENTATION_ID || !JOIN_TOKEN || !participantToken) {
                showNotice('Primero debes unirte a la reunión');
                return;
            }
            try {
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/help`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ joinToken: JOIN_TOKEN, participantToken })
                });
                if (!res.ok) {
                    showNotice('No se pudo enviar la solicitud de ayuda');
                    return;
                }
                if (navigator.vibrate) navigator.vibrate([30, 40, 30]);
                showNotice('Solicitud de ayuda enviada');
            } catch (_) {
                showNotice('Error enviando solicitud de ayuda');
            }
        }

        function showAssistCard(text) {
            assistAnswerText.textContent = text;
            assistCard.classList.add('visible');
            setTimeout(() => assistCard.classList.remove('visible'), 14000);
        }

        async function startRecording() {
            if (recording || !participantToken || !JOIN_TOKEN || !PRESENTATION_ID) {
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = event => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    await uploadAssistAudio(blob);
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                    }
                    mediaStream = null;
                    mediaRecorder = null;
                    audioChunks = [];
                };
                mediaRecorder.start();
                recording = true;
                micBtn.classList.add('recording');
                showNotice('Grabando pregunta...');
            } catch (_) {
                showNotice('No se pudo activar el micrófono');
            }
        }

        function stopRecording() {
            if (!recording || !mediaRecorder) {
                return;
            }
            recording = false;
            micBtn.classList.remove('recording');
            mediaRecorder.stop();
        }

        async function uploadAssistAudio(blob) {
            if (!blob || blob.size === 0) {
                return;
            }
            const formData = new FormData();
            formData.append('joinToken', JOIN_TOKEN);
            formData.append('participantToken', participantToken);
            formData.append('slideNumber', String(currentSlide || 1));
            formData.append('slideContext', `Slide ${currentSlide || 1}`);
            formData.append('audio', blob, 'question.webm');

            try {
                showNotice('Procesando pregunta con IA...');
                const res = await fetch(`/api/presentations/${PRESENTATION_ID}/meeting/assist/audio`, {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) {
                    showNotice('No se pudo procesar la pregunta');
                    return;
                }
                const data = await res.json();
                if (!data.success) {
                    showNotice('Error de IA: ' + (data.errorMessage || 'sin detalle'));
                    return;
                }
                const answer = data.answer || 'Sin respuesta';
                const transcription = data.transcription || '';
                showAssistCard(`Q: ${transcription}\n\nA: ${answer}`);
            } catch (_) {
                showNotice('Error de red enviando el audio');
            }
        }

        async function returnToSlide() {
            try {
                await fetch(API_DEMO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'slides' })
                });
                if (navigator.vibrate) navigator.vibrate(60);
                btnReturn.classList.remove('visible');
            } catch (_) { }
        }

        // ── Bottom sheet ───────────────────────────────────────────────────────

        function openSheet() {
            document.getElementById('bottom-sheet').classList.add('open');
            document.getElementById('sheet-overlay').classList.add('visible');
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').classList.remove('visible');
        }

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', (event) => {
            event.preventDefault();
            startRecording();
        }, { passive: false });
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        micBtn.addEventListener('touchend', (event) => {
            event.preventDefault();
            stopRecording();
        });
        micBtn.addEventListener('touchcancel', stopRecording);

        // Arrancar
        if (participantToken) {
            helpBtn.classList.add('visible');
            micBtn.classList.add('visible');
        }
        fetchState();
        loadJoinOptions();
        setInterval(fetchState, POLL_INTERVAL_MS);
    </script>
</body>

</html>
