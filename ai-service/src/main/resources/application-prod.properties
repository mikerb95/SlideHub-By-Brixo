# Producción: MongoDB Atlas (leer desde variable de entorno de Render)
spring.mongodb.uri=${MONGODB_URI}

# Gemini model (permite cambiar modelo sin redeploy de código)
slidehub.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
slidehub.ai.gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-1.5-flash,gemini-1.5-flash-latest}

# GitHub API token opcional (mejora rate limit para análisis de repositorio)
slidehub.github.token=${GITHUB_TOKEN:}
