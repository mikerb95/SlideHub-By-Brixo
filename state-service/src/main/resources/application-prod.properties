# ── Producción: Redis Cloud / Redis con autenticación ─────────────────────────
# En prod se usa REDIS_URL que contiene host, port, password y TLS en un solo valor.
# Formato esperado: rediss://default:<password>@<host>:<port>
# (rediss:// con doble S indica TLS; redis:// sin TLS)
spring.data.redis.url=${REDIS_URL}
