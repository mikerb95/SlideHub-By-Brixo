<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideHub — Iniciar sesión</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>

<body class="sh bg-sh-deep antialiased min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-[360px] sh-fade-in">

        <!-- ── Logo + Label ── -->
        <div class="text-center mb-8">

            <h1 class="font-brand text-2xl text-[var(--sh-text-1)]">SlideHub</h1>
            <div class="sh-label mt-1">AUTENTICACIÓN</div>
        </div>

        <!-- ── Auth Card ── -->
        <div class="sh-card p-6">

            <!-- Alerts -->
            <div th:if="${errorMessage}" class="sh-alert sh-alert-error mb-4">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span th:text="${errorMessage}">Error</span>
            </div>
            <div th:if="${logoutMessage}" class="sh-alert sh-alert-success mb-4">
                <i class="fa-solid fa-circle-check mt-0.5"></i>
                <span th:text="${logoutMessage}">Sesión cerrada</span>
            </div>

            <!-- Formulario de inicio de sesión -->
            <form method="post" th:action="@{/auth/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">

                <div class="mb-4">
                    <label for="username" class="sh-input-label">Usuario</label>
                    <input type="text" class="sh-input" id="username" name="username" autocomplete="username"
                        placeholder="system_user" required autofocus>
                </div>

                <div class="mb-5">
                    <label for="password" class="sh-input-label">Contraseña</label>
                    <input type="password" class="sh-input" id="password" name="password"
                        autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                        required>
                </div>

                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Iniciar sesión
                </button>
            </form>

            <!-- OAuth Separator -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-[var(--sh-border)]"></div>
                <span class="sh-label">O CONTINUAR CON</span>
                <div class="flex-1 h-px bg-[var(--sh-border)]"></div>
            </div>

            <!-- OAuth Buttons -->
            <div class="flex gap-3">
                <a href="/oauth2/authorization/github" class="sh-btn flex-1 justify-center">
                    <i class="fa-brands fa-github"></i>
                    GitHub
                </a>
                <a href="/oauth2/authorization/google" class="sh-btn flex-1 justify-center">
                    <i class="fa-brands fa-google"></i>
                    Google
                </a>
            </div>
        </div>

        <!-- Footer link -->
        <div class="text-center mt-5">
            <span class="text-[var(--sh-text-3)] text-sm">¿No tienes cuenta?</span>
            <a th:href="@{/auth/register}" class="text-[var(--sh-blue)] text-sm ml-1 hover:underline">
                Crear cuenta
            </a>
        </div>
    </div>

</body>

</html>
