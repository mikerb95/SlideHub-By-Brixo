spring.application.name=slidehub-monolith
server.port=${PORT:8080}
server.forward-headers-strategy=framework

slidehub.base-url=${BASE_URL:http://localhost:8080}

spring.main.web-application-type=servlet

# ── Polling / status UI ──────────────────────────────────────────────────────
slidehub.poll.status.interval-ms=2000
slidehub.status.check.timeout-ms=2500
slidehub.status.cache-ttl-ms=1000

# ── Keep alive (modo monolito) ───────────────────────────────────────────────
slidehub.keep-alive.user-activity-window-ms=300000
slidehub.keep-alive.interval-ms=120000
slidehub.keep-alive.initial-delay-ms=60000

# ── PostgreSQL / Aiven ────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:slidehub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Redis state ───────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
slidehub.slides.directory=${SLIDES_DIR:./slides}

# ── MongoDB IA ────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:}

# ── OAuth2 — GitHub ───────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.user-name-attribute=login

# ── OAuth2 — Google ───────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=email

spring.security.oauth2.client.registration.google-drive.provider=google
spring.security.oauth2.client.registration.google-drive.client-id=${GOOGLE_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.google-drive.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.google-drive.scope=email,profile,https://www.googleapis.com/auth/drive.readonly
spring.security.oauth2.client.registration.google-drive.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google-drive.authorization-grant-type=authorization_code

# ── IA externa ────────────────────────────────────────────────────────────────
slidehub.ai.gemini.api-key=${GEMINI_API_KEY:placeholder}
slidehub.ai.gemini.base-url=https://generativelanguage.googleapis.com
slidehub.ai.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
slidehub.ai.gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-1.5-flash,gemini-1.5-flash-latest}
slidehub.ai.groq.api-key=${GROQ_API_KEY:placeholder}
slidehub.ai.groq.base-url=https://api.groq.com
slidehub.ai.groq.model=${GROQ_MODEL:llama3-8b-8192}
slidehub.github.api-base-url=${GITHUB_API_BASE_URL:https://api.github.com}
slidehub.github.token=${GITHUB_TOKEN:}
slidehub.github.max-files-for-context=${GITHUB_MAX_FILES_FOR_CONTEXT:120}

# ── Email y Storage ───────────────────────────────────────────────────────────
slidehub.resend.api-key=${RESEND_API_KEY:changeme}
slidehub.resend.from=noreply@slidehub.app
aws.s3.bucket=${AWS_S3_BUCKET:slidehub-assets}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:changeme}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:changeme}

# ── Rate limit (portado de gateway) ──────────────────────────────────────────
slidehub.gateway.rate-limit.enabled=true
slidehub.gateway.rate-limit.trust-forwarded-for=true
slidehub.gateway.rate-limit.cleanup-interval-ms=600000
slidehub.gateway.rate-limit.retry-after-seconds=60

slidehub.gateway.rate-limit.rules[0].name=ai-assist-audio
slidehub.gateway.rate-limit.rules[0].pattern=/api/ai/assist/audio
slidehub.gateway.rate-limit.rules[0].methods=POST
slidehub.gateway.rate-limit.rules[0].limit=5
slidehub.gateway.rate-limit.rules[0].window=PT1M

slidehub.gateway.rate-limit.rules[1].name=ai-deploy
slidehub.gateway.rate-limit.rules[1].pattern=/api/ai/deploy/**
slidehub.gateway.rate-limit.rules[1].methods=POST
slidehub.gateway.rate-limit.rules[1].limit=6
slidehub.gateway.rate-limit.rules[1].window=PT2M

slidehub.gateway.rate-limit.rules[2].name=ai-repo-analysis
slidehub.gateway.rate-limit.rules[2].pattern=/api/ai/analyze-repo
slidehub.gateway.rate-limit.rules[2].methods=POST
slidehub.gateway.rate-limit.rules[2].limit=6
slidehub.gateway.rate-limit.rules[2].window=PT2M

slidehub.gateway.rate-limit.rules[3].name=ai-repo-analysis-refresh
slidehub.gateway.rate-limit.rules[3].pattern=/api/ai/analyze-repo/refresh
slidehub.gateway.rate-limit.rules[3].methods=POST
slidehub.gateway.rate-limit.rules[3].limit=6
slidehub.gateway.rate-limit.rules[3].window=PT2M

slidehub.gateway.rate-limit.rules[4].name=meeting-join
slidehub.gateway.rate-limit.rules[4].pattern=/api/presentations/*/meeting/join
slidehub.gateway.rate-limit.rules[4].methods=POST
slidehub.gateway.rate-limit.rules[4].limit=12
slidehub.gateway.rate-limit.rules[4].window=PT1M
slidehub.gateway.rate-limit.rules[4].key-query-params=joinToken

slidehub.gateway.rate-limit.rules[5].name=meeting-help
slidehub.gateway.rate-limit.rules[5].pattern=/api/presentations/*/meeting/help
slidehub.gateway.rate-limit.rules[5].methods=POST
slidehub.gateway.rate-limit.rules[5].limit=10
slidehub.gateway.rate-limit.rules[5].window=PT1M
slidehub.gateway.rate-limit.rules[5].key-query-params=joinToken,participantToken

slidehub.gateway.rate-limit.rules[6].name=meeting-assist-audio
slidehub.gateway.rate-limit.rules[6].pattern=/api/presentations/*/meeting/assist/audio
slidehub.gateway.rate-limit.rules[6].methods=POST
slidehub.gateway.rate-limit.rules[6].limit=5
slidehub.gateway.rate-limit.rules[6].window=PT1M
slidehub.gateway.rate-limit.rules[6].key-query-params=joinToken,participantToken,slideNumber

slidehub.gateway.rate-limit.rules[7].name=haptics-publish
slidehub.gateway.rate-limit.rules[7].pattern=/api/haptics/events/publish
slidehub.gateway.rate-limit.rules[7].methods=POST
slidehub.gateway.rate-limit.rules[7].limit=20
slidehub.gateway.rate-limit.rules[7].window=PT1M
slidehub.gateway.rate-limit.rules[7].key-query-params=participantToken

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
