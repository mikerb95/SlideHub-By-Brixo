spring.application.name=gateway-service
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Config Server — archivos locales en classpath:/config-repo/
spring.cloud.config.server.native.search-locations=classpath:/config-repo
spring.profiles.active=native
spring.profiles.group.prod=native

# URLs de servicios (con fallback para desarrollo local)
slidehub.state-service.url=${STATE_SERVICE_URL:http://localhost:8081}
slidehub.ui-service.url=${UI_SERVICE_URL:http://localhost:8082}
slidehub.ai-service.url=${AI_SERVICE_URL:http://localhost:8083}

# Rate limit — protección contra abuso de IA/audio y endpoints públicos sensibles
slidehub.gateway.rate-limit.enabled=true
slidehub.gateway.rate-limit.trust-forwarded-for=true
slidehub.gateway.rate-limit.cleanup-interval-ms=600000
slidehub.gateway.rate-limit.retry-after-seconds=60

slidehub.gateway.rate-limit.rules[0].name=ai-assist-audio
slidehub.gateway.rate-limit.rules[0].pattern=/api/ai/assist/audio
slidehub.gateway.rate-limit.rules[0].methods=POST
slidehub.gateway.rate-limit.rules[0].limit=5
slidehub.gateway.rate-limit.rules[0].window=PT1M

slidehub.gateway.rate-limit.rules[1].name=ai-deploy
slidehub.gateway.rate-limit.rules[1].pattern=/api/ai/deploy/**
slidehub.gateway.rate-limit.rules[1].methods=POST
slidehub.gateway.rate-limit.rules[1].limit=6
slidehub.gateway.rate-limit.rules[1].window=PT2M

slidehub.gateway.rate-limit.rules[2].name=ai-repo-analysis
slidehub.gateway.rate-limit.rules[2].pattern=/api/ai/analyze-repo
slidehub.gateway.rate-limit.rules[2].methods=POST
slidehub.gateway.rate-limit.rules[2].limit=6
slidehub.gateway.rate-limit.rules[2].window=PT2M

slidehub.gateway.rate-limit.rules[3].name=ai-repo-analysis-refresh
slidehub.gateway.rate-limit.rules[3].pattern=/api/ai/analyze-repo/refresh
slidehub.gateway.rate-limit.rules[3].methods=POST
slidehub.gateway.rate-limit.rules[3].limit=6
slidehub.gateway.rate-limit.rules[3].window=PT2M

slidehub.gateway.rate-limit.rules[4].name=meeting-join
slidehub.gateway.rate-limit.rules[4].pattern=/api/presentations/*/meeting/join
slidehub.gateway.rate-limit.rules[4].methods=POST
slidehub.gateway.rate-limit.rules[4].limit=12
slidehub.gateway.rate-limit.rules[4].window=PT1M
slidehub.gateway.rate-limit.rules[4].key-query-params=joinToken

slidehub.gateway.rate-limit.rules[5].name=meeting-help
slidehub.gateway.rate-limit.rules[5].pattern=/api/presentations/*/meeting/help
slidehub.gateway.rate-limit.rules[5].methods=POST
slidehub.gateway.rate-limit.rules[5].limit=10
slidehub.gateway.rate-limit.rules[5].window=PT1M
slidehub.gateway.rate-limit.rules[5].key-query-params=joinToken,participantToken

slidehub.gateway.rate-limit.rules[6].name=meeting-assist-audio
slidehub.gateway.rate-limit.rules[6].pattern=/api/presentations/*/meeting/assist/audio
slidehub.gateway.rate-limit.rules[6].methods=POST
slidehub.gateway.rate-limit.rules[6].limit=5
slidehub.gateway.rate-limit.rules[6].window=PT1M
slidehub.gateway.rate-limit.rules[6].key-query-params=joinToken,participantToken,slideNumber

slidehub.gateway.rate-limit.rules[7].name=haptics-publish
slidehub.gateway.rate-limit.rules[7].pattern=/api/haptics/events/publish
slidehub.gateway.rate-limit.rules[7].methods=POST
slidehub.gateway.rate-limit.rules[7].limit=20
slidehub.gateway.rate-limit.rules[7].window=PT1M
slidehub.gateway.rate-limit.rules[7].key-query-params=participantToken

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
