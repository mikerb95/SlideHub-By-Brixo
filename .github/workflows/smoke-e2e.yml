name: Smoke E2E Monolith

on:
  push:
    branches:
      - development
    paths:
      - 'slidehub-service/**'
      - 'scripts/smoke-e2e.sh'
      - '.github/workflows/smoke-e2e.yml'
      - 'docs/SMOKE-E2E.md'
  pull_request:
    branches:
      - development
    paths:
      - 'slidehub-service/**'
      - 'scripts/smoke-e2e.sh'
      - '.github/workflows/smoke-e2e.yml'
      - 'docs/SMOKE-E2E.md'
  workflow_dispatch:

jobs:
  smoke-e2e-monolith:
    name: Run monolith smoke script
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ensure Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run smoke script
        run: |
          chmod +x ./scripts/smoke-e2e.sh
          ./scripts/smoke-e2e.sh

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: target/smoke-logs/
          if-no-files-found: warn
